name: Deploy to DomainAdda

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies and build
        run: |
          npm install
          npm run build
          cp dist/index.html dist/404.html

      - name: FTP Deploy to DomainAdda
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftp.reddevils.co.in # Replace with your actual DomainAdda FTP server address
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ # IMPORTANT: This tells it to only upload the finished build folder
          server-dir: /
